<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>StreamIt Player</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #v { width: 100%; height: 100%; object-fit: contain; background: #000; display: block; }
      /* Custom control bar, used only when the source plays through the ffmpeg
         pipeline (fragmented MP4 has no end, so native seeking can't work). */
      #bar {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 5;
        display: none; align-items: center; gap: 10px;
        padding: 8px 14px;
        background: linear-gradient(transparent, rgba(0,0,0,0.75));
        color: #dbdee1; font: 13px "Segoe UI", system-ui, sans-serif;
        transition: opacity 0.25s;
      }
      #bar.on { display: flex; }
      #bar.idle { opacity: 0; }
      #bar button {
        background: none; border: 0; color: #dbdee1; cursor: pointer;
        font-size: 16px; width: 30px; height: 26px; padding: 0;
      }
      #bar button:hover { color: #fff; }
      #seek { flex: 1; accent-color: #5865f2; cursor: pointer; }
      #time { min-width: 96px; text-align: center; font-variant-numeric: tabular-nums; }
      /* Subtitle / audio track pop-up menus. */
      .menu { position: relative; }
      .menu > button.active { color: #5865f2; }
      .menu .items {
        display: none; position: absolute; bottom: 34px; right: 0;
        min-width: 150px; max-height: 260px; overflow-y: auto;
        background: #1e1f22; border: 1px solid #2b2d31; border-radius: 8px;
        padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      }
      .menu.open .items { display: block; }
      .menu .items button {
        display: block; width: 100%; text-align: left; white-space: nowrap;
        font-size: 12.5px; height: auto; padding: 6px 10px; border-radius: 5px;
      }
      .menu .items button:hover { background: #2b2d31; }
      .menu .items button.sel { color: #5865f2; }
      .menu .items button:disabled { color: #4e5058; cursor: default; }
      #v::cue { background: rgba(0,0,0,0.6); color: #fff; }
      /* Subtitle/audio buttons show a glyph, not the fixed 16px control size. */
      #bar button.txt { width: auto; padding: 0 6px; font-size: 12px; font-weight: 600; }
      #overlay {
        position: fixed; inset: 0; display: none; z-index: 4;
        align-items: center; justify-content: center; pointer-events: none;
        color: #dbdee1; font: 15px "Segoe UI", system-ui, sans-serif;
        text-shadow: 0 1px 4px #000;
      }
      #overlay.on { display: flex; }
    </style>
  </head>
  <body>
    <video id="v" autoplay></video>
    <div id="overlay">Buffering…</div>
    <div id="bar">
      <button id="play" title="Play/Pause">⏸</button>
      <input id="seek" type="range" min="0" max="1000" value="0" step="1" />
      <span id="time">0:00 / 0:00</span>
      <div class="menu" id="subMenu" style="display:none">
        <button class="txt" id="subBtn" title="Subtitles">CC</button>
        <div class="items" id="subItems"></div>
      </div>
      <div class="menu" id="audMenu" style="display:none">
        <button id="audBtn" title="Audio track">🎧</button>
        <div class="items" id="audItems"></div>
      </div>
      <button id="mute" title="Mute">🔊</button>
      <button id="fs" title="Fullscreen">⛶</button>
    </div>
    <script>
      const params = new URLSearchParams(location.search)
      const src = params.get('src') // local file path
      const turl = params.get('turl') // torrent loopback stream URL
      const sourceQS = src
        ? 'src=' + encodeURIComponent(src)
        : 'turl=' + encodeURIComponent(turl || '')

      const v = document.getElementById('v')
      const bar = document.getElementById('bar')
      const seek = document.getElementById('seek')
      const timeEl = document.getElementById('time')
      const playBtn = document.getElementById('play')
      const muteBtn = document.getElementById('mute')
      const overlay = document.getElementById('overlay')
      const subMenu = document.getElementById('subMenu')
      const audMenu = document.getElementById('audMenu')
      const subItems = document.getElementById('subItems')
      const audItems = document.getElementById('audItems')

      document.title =
        params.get('title') ||
        (src ? decodeURIComponent(src).split(/[\\/]/).pop() : 'StreamIt Player')

      // ---- playback state ----
      // pipeline mode: the stream starts at `offset` seconds; the <video>'s own
      // clock is relative to that. Seeking = restart the stream at a new offset.
      let mode = 'direct'
      let baseMode = 'direct' // what probe decided, before any audio-track override
      let duration = 0
      let offset = 0
      let triedFull = false
      let barShown = false
      // Track selection.
      let audioTracks = []
      let subtitleTracks = []
      let audioIndex // undefined = default track; else absolute ffmpeg index
      let currentSub = -1 // -1 = off; else subtitle stream index
      let trackEl = null // the active <track> element

      const fmt = (s) => {
        s = Math.max(0, Math.round(s))
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60
        return (h ? h + ':' + String(m).padStart(2, '0') : m) + ':' + String(x).padStart(2, '0')
      }
      const now = () => (mode === 'direct' ? v.currentTime : offset + v.currentTime)

      function setSource(startAt) {
        if (mode === 'direct') {
          offset = 0
          v.src = 'streamit://app/media?' + sourceQS
        } else {
          offset = startAt || 0
          let u = 'streamit://app/pipe?' + sourceQS + '&mode=' + mode + '&t=' + offset
          if (audioIndex !== undefined) u += '&a=' + audioIndex
          v.src = u
        }
        v.play().catch(() => {})
        applySubtitle() // re-attach the <track> at the new offset
      }

      async function start() {
        let probe = null
        try {
          const res = await fetch('streamit://app/probe?' + sourceQS)
          if (res.ok) probe = await res.json()
        } catch {}
        mode = baseMode = probe && probe.mode ? probe.mode : 'direct'
        duration = probe ? probe.duration : 0
        audioTracks = (probe && probe.audioTracks) || []
        subtitleTracks = ((probe && probe.subtitleTracks) || []).filter((t) => t.textBased)
        buildMenus()
        // Show the custom bar for pipeline playback, or whenever there are tracks
        // to pick even on a directly-playing file.
        barShown = mode !== 'direct' || subtitleTracks.length > 0 || audioTracks.length > 1
        if (barShown) bar.classList.add('on')
        else v.controls = true
        setSource(0)
      }

      // ---- track menus ----
      function trackLabel(t, i, kind) {
        const lang = t.language && t.language !== 'und' ? t.language : ''
        return t.title || [lang, t.channels ? t.channels + 'ch' : ''].filter(Boolean).join(' ') ||
          kind + ' ' + (i + 1)
      }

      function buildMenus() {
        // Audio: only worth showing when there's a choice.
        if (audioTracks.length > 1) {
          audMenu.style.display = ''
          audItems.innerHTML = ''
          audioTracks.forEach((t, i) => {
            const b = document.createElement('button')
            b.textContent = trackLabel(t, i, 'Audio') + (t.codec ? '  ·  ' + t.codec : '')
            b.dataset.idx = String(t.index)
            b.addEventListener('click', () => chooseAudio(t.index))
            audItems.appendChild(b)
          })
        }
        // Subtitles: Off + each text track.
        if (subtitleTracks.length > 0) {
          subMenu.style.display = ''
          subItems.innerHTML = ''
          const off = document.createElement('button')
          off.textContent = 'Off'
          off.dataset.idx = '-1'
          off.addEventListener('click', () => chooseSub(-1))
          subItems.appendChild(off)
          subtitleTracks.forEach((t, i) => {
            const b = document.createElement('button')
            b.textContent = trackLabel(t, i, 'Subtitle')
            b.dataset.idx = String(t.index)
            b.addEventListener('click', () => chooseSub(t.index))
            subItems.appendChild(b)
          })
        }
        markSelections()
      }

      function markSelections() {
        const curAudio = audioIndex === undefined
          ? (audioTracks.find((t) => t.isDefault) || audioTracks[0] || {}).index
          : audioIndex
        audItems.querySelectorAll('button').forEach((b) =>
          b.classList.toggle('sel', Number(b.dataset.idx) === curAudio)
        )
        subItems.querySelectorAll('button').forEach((b) =>
          b.classList.toggle('sel', Number(b.dataset.idx) === currentSub)
        )
        subMenu.querySelector('button').classList.toggle('active', currentSub !== -1)
      }

      function chooseAudio(index) {
        const def = (audioTracks.find((t) => t.isDefault) || audioTracks[0] || {}).index
        if (index === def && baseMode === 'direct') {
          mode = 'direct'
          audioIndex = undefined
        } else {
          // A non-default (or any track on a non-direct file) needs the pipeline.
          mode = baseMode === 'direct' ? 'remux' : baseMode
          audioIndex = index
        }
        if (!barShown) { barShown = true; bar.classList.add('on'); v.controls = false }
        audMenu.classList.remove('open')
        setSource(now())
        markSelections()
      }

      function chooseSub(index) {
        currentSub = index
        subMenu.classList.remove('open')
        applySubtitle()
        markSelections()
      }

      // --- WebVTT timestamp rebasing ---
      // The video's clock is relative to the pipeline offset after a seek, but the
      // extracted VTT is absolute; shift cue times by -offset so they line up.
      function parseTs(ts) {
        const m = ts.match(/(?:(\d+):)?(\d{2}):(\d{2})\.(\d{3})/)
        if (!m) return 0
        return (m[1] ? +m[1] : 0) * 3600 + +m[2] * 60 + +m[3] + +m[4] / 1000
      }
      function fmtTs(sec) {
        sec = Math.max(0, sec)
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60)
        const s = Math.floor(sec % 60), ms = Math.round((sec - Math.floor(sec)) * 1000)
        const p2 = (n) => String(n).padStart(2, '0')
        return p2(h) + ':' + p2(m) + ':' + p2(s) + '.' + String(ms).padStart(3, '0')
      }
      function shiftVtt(text, offsetSec) {
        if (!text) return 'WEBVTT\n\n'
        if (!offsetSec) return text
        const blocks = text.replace(/\r\n/g, '\n').split(/\n\n+/)
        const out = []
        blocks.forEach((block, bi) => {
          if (bi === 0) { out.push(block); return } // WEBVTT header
          const lines = block.split('\n')
          const ti = lines.findIndex((l) => l.includes('-->'))
          if (ti < 0) { out.push(block); return } // NOTE/STYLE block
          const m = lines[ti].match(
            /(\d{1,2}:\d{2}:\d{2}\.\d{3}|\d{2}:\d{2}\.\d{3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}\.\d{3}|\d{2}:\d{2}\.\d{3})(.*)$/
          )
          if (!m) { out.push(block); return }
          let start = parseTs(m[1]) - offsetSec
          const end = parseTs(m[2]) - offsetSec
          if (end <= 0) return // cue fully before the seek point — drop it
          if (start < 0) start = 0
          lines[ti] = lines[ti].slice(0, m.index) + fmtTs(start) + ' --> ' + fmtTs(end) + (m[3] || '')
          out.push(lines.join('\n'))
        })
        return out.join('\n\n') + '\n'
      }

      // Attach (or clear) the active subtitle track, rebased for the current offset.
      const subCache = {}
      async function applySubtitle() {
        if (trackEl) { URL.revokeObjectURL(trackEl.src); trackEl.remove(); trackEl = null }
        if (currentSub < 0) return
        const idx = currentSub
        if (subCache[idx] === undefined) {
          try {
            const res = await fetch('streamit://app/subs?' + sourceQS + '&i=' + idx)
            subCache[idx] = res.ok ? await res.text() : ''
          } catch { subCache[idx] = '' }
        }
        if (currentSub !== idx) return // selection changed while fetching
        const blob = new Blob([shiftVtt(subCache[idx], mode === 'direct' ? 0 : offset)], {
          type: 'text/vtt'
        })
        const t = document.createElement('track')
        t.kind = 'subtitles'
        t.default = true
        t.src = URL.createObjectURL(blob)
        v.appendChild(t)
        trackEl = t
        // Force display once cues are parsed (dynamic tracks default to hidden).
        t.addEventListener('load', () => {
          for (const tt of v.textTracks) tt.mode = 'showing'
        })
      }

      // If playback fails (e.g. HEVC probe said "direct" but this machine has no
      // hardware decoder, or a copied stream Chromium rejects), fall back once to
      // the everything-transcoded pipeline, which always plays.
      v.addEventListener('error', () => {
        if (triedFull) return
        triedFull = true
        const at = now()
        mode = baseMode = 'full'
        v.controls = false
        barShown = true
        bar.classList.add('on')
        setSource(at)
      })

      // ---- custom controls (pipeline mode) ----
      let scrubbing = false
      playBtn.addEventListener('click', () => (v.paused ? v.play() : v.pause()))
      v.addEventListener('play', () => (playBtn.textContent = '⏸'))
      v.addEventListener('pause', () => (playBtn.textContent = '▶'))
      muteBtn.addEventListener('click', () => {
        v.muted = !v.muted
        muteBtn.textContent = v.muted ? '🔇' : '🔊'
      })
      document.getElementById('fs').addEventListener('click', () => {
        document.fullscreenElement
          ? document.exitFullscreen()
          : document.documentElement.requestFullscreen()
      })

      // Seek to a time: native currentTime in direct mode, pipeline restart otherwise.
      function seekTo(t) {
        if (mode === 'direct') v.currentTime = Math.max(0, t)
        else setSource(Math.max(0, t))
      }

      seek.addEventListener('input', () => {
        scrubbing = true
        timeEl.textContent = fmt((seek.value / 1000) * duration) + ' / ' + fmt(duration)
      })
      seek.addEventListener('change', () => {
        scrubbing = false
        if (duration > 0) seekTo((seek.value / 1000) * duration)
      })
      setInterval(() => {
        if (!barShown || scrubbing) return
        const d = duration || v.duration || 0
        timeEl.textContent = fmt(now()) + ' / ' + fmt(d)
        if (d > 0) seek.value = String(Math.min(1000, (now() / d) * 1000))
      }, 500)

      // Track menus: toggle open, and close when clicking elsewhere.
      for (const [btnId, menu] of [['subBtn', subMenu], ['audBtn', audMenu]]) {
        document.getElementById(btnId).addEventListener('click', (e) => {
          e.stopPropagation()
          const wasOpen = menu.classList.contains('open')
          subMenu.classList.remove('open')
          audMenu.classList.remove('open')
          if (!wasOpen) menu.classList.add('open')
        })
      }
      document.addEventListener('click', () => {
        subMenu.classList.remove('open')
        audMenu.classList.remove('open')
      })

      // Space/arrow keys once the custom bar is in charge.
      window.addEventListener('keydown', (e) => {
        if (!barShown) return
        if (e.code === 'Space') { e.preventDefault(); v.paused ? v.play() : v.pause() }
        if (e.code === 'ArrowRight') seekTo(now() + 10)
        if (e.code === 'ArrowLeft') seekTo(now() - 10)
      })

      // Auto-hide the bar (and cursor) while watching.
      let idleTimer
      function poke() {
        bar.classList.remove('idle')
        document.body.style.cursor = ''
        clearTimeout(idleTimer)
        idleTimer = setTimeout(() => {
          if (!v.paused) {
            bar.classList.add('idle')
            document.body.style.cursor = 'none'
          }
        }, 2500)
      }
      window.addEventListener('mousemove', poke)
      poke()

      // Buffering indicator — matters for torrents still fetching pieces.
      v.addEventListener('waiting', () => overlay.classList.add('on'))
      v.addEventListener('playing', () => overlay.classList.remove('on'))
      v.addEventListener('canplay', () => overlay.classList.remove('on'))

      // ---- loudness normalization (unchanged; see docs/DECISIONS.md) ----
      const TARGET_RMS = 0.12 // ~ -18 dBFS perceived target
      let ctx, srcNode, gain, comp, analyser, data, normalizeOn = true, timer

      function applyMode() {
        if (!comp) return
        comp.ratio.value = normalizeOn ? 20 : 1
        comp.threshold.value = normalizeOn ? -3 : 0
      }

      function measure() {
        if (!analyser) return
        analyser.getFloatTimeDomainData(data)
        let sum = 0
        for (let i = 0; i < data.length; i++) sum += data[i] * data[i]
        const rms = Math.sqrt(sum / data.length)
        if (normalizeOn && rms > 0.0005) {
          const g = Math.max(0.5, Math.min(4, TARGET_RMS / rms))
          gain.gain.setTargetAtTime(g, ctx.currentTime, 0.6)
        } else if (!normalizeOn) {
          gain.gain.setTargetAtTime(1, ctx.currentTime, 0.2)
        }
        timer = setTimeout(measure, 250)
      }

      function setupGraph() {
        if (ctx) return
        ctx = new AudioContext()
        srcNode = ctx.createMediaElementSource(v)
        gain = ctx.createGain()
        comp = ctx.createDynamicsCompressor()
        comp.knee.value = 0
        comp.attack.value = 0.003
        comp.release.value = 0.25
        analyser = ctx.createAnalyser()
        analyser.fftSize = 1024
        data = new Float32Array(analyser.fftSize)
        srcNode.connect(analyser)
        srcNode.connect(gain)
        gain.connect(comp)
        comp.connect(ctx.destination)
        applyMode()
        measure()
      }

      v.addEventListener('play', async () => {
        setupGraph()
        if (ctx.state === 'suspended') await ctx.resume()
      })

      if (window.streamitTab && window.streamitTab.onNormalize) {
        window.streamitTab.onNormalize((on) => {
          normalizeOn = !!on
          applyMode()
        })
      }

      start()
    </script>
  </body>
</html>
