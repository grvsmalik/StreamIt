appId: com.streamit.app
productName: StreamIt
directories:
  output: dist
  buildResources: build
# Renderer/main are pre-bundled by electron-vite into out/. Also ship the player
# page (read at runtime via the streamit:// protocol) and the window icon.
files:
  - out/**/*
  - src/player/**/*
  - build/icon.png
  - package.json
# ffmpeg/ffprobe are native executables — they must live outside the asar so
# they can be spawned. media.ts rewrites app.asar → app.asar.unpacked to find them.
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: grvsmalik
  repo: StreamIt
