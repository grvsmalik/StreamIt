appId: com.streamit.app
productName: StreamIt
directories:
  output: dist
  buildResources: build
# Renderer/main are pre-bundled by electron-vite into out/. Also ship the player
# page (read at runtime via the streamit:// protocol) and the window icon.
files:
  - out/**/*
  - src/player/**/*
  - build/icon.png
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
